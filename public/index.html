<!DOCTYPE html>
<html>
  <head><title>Metro React App</title></head>
  <body>
    <div id="root"></div>
    <script src="/src/index.jsx.bundle?platform=web&dev=true"></script>
    <script>
      const ws = new WebSocket('ws://localhost:3000/hot');
      ws.onopen = () => {
        ws.send(JSON.stringify({
          type: 'register-entrypoints',
          entryPoints: ['http://localhost:3000/src/index.jsx.bundle?platform=web&dev=true'],
        }));
      };
      ws.onmessage = (msg) => {
        const data = JSON.parse(msg.data);
        if (data.type === 'update') {
          [...data.body.added, ...data.body.modified].forEach(({ module: [, code] }) => eval(code));
        }
        if (data.type === 'error') {
          console.error('[HMR]', data.body.type, data.body.message);
        }
      };
    </script>
  </body>
</html>
